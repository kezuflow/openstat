name: Deploy Hetzner Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hetzner-main
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: openstat_test
          POSTGRES_PASSWORD: openstat
          POSTGRES_USER: openstat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openstat -d openstat_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm check-types

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Backend tests
        run: pnpm --filter backend test

      - name: Migrate integration database
        env:
          DATABASE_URL: postgres://openstat:openstat@localhost:5432/openstat_test
        run: pnpm --filter @openstat/db db:migrate

      - name: Backend integration tests
        env:
          OPENSTAT_INTEGRATION_DATABASE_URL: postgres://openstat:openstat@localhost:5432/openstat_test
        run: pnpm --filter backend test:integration

      - name: Python SDK tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "sdks/python[test]"
          python -m pytest sdks/python

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Configure SSH
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/hetzner_deploy_key
          chmod 600 ~/.ssh/hetzner_deploy_key
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host hetzner-openstat
            HostName $HETZNER_HOST
            User $HETZNER_USER
            IdentityFile ~/.ssh/hetzner_deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF

      - name: Deploy Docker Compose stack
        env:
          REPO_DIR: ${{ secrets.HETZNER_REPO_DIR }}
        run: |
          set -eu
          ssh hetzner-openstat "REPO_DIR='${REPO_DIR:-/home/deploy/openstat}' bash -s" <<'EOF'
          set -eu
          cd "$REPO_DIR"

          if [ ! -f deploy/hetzner/.env ]; then
            echo "Missing deploy/hetzner/.env on the VPS." >&2
            exit 1
          fi

          git fetch --prune origin
          git checkout main
          git reset --hard origin/main

          docker compose -f deploy/hetzner/docker-compose.yml --env-file deploy/hetzner/.env build api worker
          docker compose -f deploy/hetzner/docker-compose.yml --env-file deploy/hetzner/.env up -d postgres redis
          docker compose -f deploy/hetzner/docker-compose.yml --env-file deploy/hetzner/.env run --rm api pnpm --filter @openstat/db db:migrate
          docker compose -f deploy/hetzner/docker-compose.yml --env-file deploy/hetzner/.env up -d --remove-orphans

          docker exec hetzner-api-1 node -e "fetch('http://127.0.0.1:4000/ready').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
          EOF
